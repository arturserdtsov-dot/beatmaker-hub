<center>
    <h1>Пошук співавторів</h1>
    <p>Тут ти можеш знайти бітмейкера або вокаліста для спільної роботи.</p>
</center>
<hr>

<form>
    <fieldset>
        <legend>Твоя анкета</legend>
        <label>Твій нікнейм:</label><br>
        <input type="text" name="nick" class="background-collab"  placeholder="Наприклад, dxubleyou"><br><br>

        <label>Жанр, у якому працюєш:</label><br>
        <select name="genre" class="background-collab">
            <option value="phonk">Brazilian Phonk</option>
            <option value="hardtekk">Hardtekk</option>
            <option value="trap">Trap / Drill</option>
            <option value="hiphop">Rap</option>
        </select><br><br>

        <label>Посилання на твої роботи (SoundCloud/Spotify):</label><br>
        <input type="url" name="link" class="background-collab"><br><br>

        <label>Повідомлення для партнера:</label><br>
        <textarea rows="4" cols="50" class="background-collab">Привіт! Шукаю когось для створення агресивного фонк-треку...</textarea><br><br>

        <button type="submit">Опублікувати запит</button> 
        <button type="reset">Очистити форму</button> 
    </fieldset>
</form>
